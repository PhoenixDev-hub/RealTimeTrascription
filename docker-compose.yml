version: '3.9'

services:
  backend:
    build:
      context: ./server/ai
      dockerfile: Dockerfile
    container_name: duallibras-backend
    ports:
      - "5455:5455"
    environment:
      - AUDIO_SAMPLE_RATE=16000
      - AUDIO_CHANNELS=1
      - AUDIO_CHUNK_SIZE=1600
      - AUDIO_QUEUE_MAX_SIZE=8
      - USE_WEBRTC_VAD=1
      - VAD_MODE=2
      - VAD_ENERGY_THRESHOLD=300
      - VAD_HOLD_SILENCE_MS=240
      - SPEECH_MODEL=u3-rt-pro
      - LOCAL_FALLBACK=1
      - LOCAL_FALLBACK_MODEL=small
      - USE_PORTUGUESE_PROMPT=1
      - SAVE_TRANSCRIPTS=1
      - TRANSCRIPT_OUTPUT_DIR=/app/transcripts
      - LOG_LEVEL=INFO
      - PORT=5455
    volumes:
      - ./server/ai/transcripts:/app/transcripts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5455/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - duallibras-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: duallibras-frontend
    ports:
      - "80:80"
    environment:
      - VITE_BACKEND_HOST=backend
      - VITE_BACKEND_PORT=5455
      - VITE_BACKEND_WS_URL=ws://localhost:5455/ws
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - duallibras-network
    restart: unless-stopped

networks:
  duallibras-network:
    driver: bridge

volumes:
  transcripts:
    driver: local
